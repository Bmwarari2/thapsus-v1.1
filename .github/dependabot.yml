version: 2
updates:
  # KMP shared module + Android app — Kotlin, Coroutines, Ktor, Supabase-KT,
  # SQLDelight, Koin, SKIE, AGP, Compose BOM, CameraX, ML Kit, etc. all live
  # in build.gradle.kts files plus gradle/libs.versions.toml.
  - package-ecosystem: gradle
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/London
    open-pull-requests-limit: 5
    target-branch: main
    labels:
      - dependencies
      - kmp
    commit-message:
      prefix: "chore(deps)"
      include: scope
    groups:
      kmp-patch-and-minor:
        patterns:
          - "*"
        update-types:
          - patch
          - minor
    # Pin majors that Kotlin / SKIE compatibility constraints — bumping any of
    # these without coordinating with SKIE 0.10.x's supported Kotlin range will
    # break the iOS framework build.
    ignore:
      - dependency-name: org.jetbrains.kotlin*
        update-types:
          - version-update:semver-major
      - dependency-name: co.touchlab.skie*
        update-types:
          - version-update:semver-major

  # GitHub Actions used by future workflows (CodeQL + iOS a11y CI gate).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/London
    open-pull-requests-limit: 3
    target-branch: main
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: "chore(deps/actions)"
      include: scope

# Note: iOS Swift Package Manager dependencies are managed inside the .xcodeproj
# (not via a top-level Package.swift), so Dependabot's `swift` ecosystem can't
# track them. Use Xcode → File → Packages → Update To Latest Package Versions
# manually for SPM bumps; CodeQL still scans Swift sources for vulns.
