name: CodeQL

# CodeQL static analysis (audit F-12). Catches Swift / Kotlin patterns
# that compile cleanly but ship a vulnerability — e.g. weak crypto, RegEx
# DoS, unsafe URL construction, hard-coded secrets, JSON deserialisation
# of untrusted input. Pairs with Dependabot (audit F-11) so the Security
# tab gives a real picture rather than zero coverage.

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - ".github/dependabot.yml"
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - ".github/dependabot.yml"
  schedule:
    # Weekly Monday 06:00 UTC — catches newly-disclosed CVE patterns
    # against unchanged code.
    - cron: "0 6 * * 1"

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    # macos-15 because Swift analysis requires Xcode. Kotlin (KMP shared
    # module + Android app) compiles fine on macOS too, so one runner
    # covers both languages and keeps job count down.
    runs-on: macos-15
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        language: [swift, java-kotlin]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      # Xcode comes pre-installed on macos-15; xcodebuild is on PATH.
      # CodeQL's Swift autobuild calls `xcodebuild` on the .xcodeproj
      # under iosApp/, so no explicit Xcode-select is needed unless we
      # need to pin a non-default Xcode major.

      - name: Init CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          # security-extended adds extra vuln queries above the default set
          # without crossing into the noisier security-and-quality bucket.
          queries: security-extended
          # Swift: keep autobuild — xcodebuild on the .xcodeproj works fine.
          # Kotlin: manual mode. The default autobuilder calls
          # `./gradlew testClasses` which doesn't exist in KMP projects
          # (root + shared have no JVM Java source set; only androidApp
          # provides that task). Manual mode hands the build over to the
          # explicit gradle step below so we pick the right tasks.
          build-mode: ${{ matrix.language == 'swift' && 'autobuild' || 'manual' }}

      # Swift's autobuild runs inside the init step above when build-mode
      # is autobuild. For KMP we drive Gradle ourselves: `assembleDebug` on
      # :androidApp transitively compiles :shared (the JVM source set is
      # what CodeQL's Kotlin extractor instruments), which is enough to
      # extract every Kotlin source file in this repo. No iOS Kotlin/Native
      # targets compile here — Swift is the other matrix entry, so we'd
      # only be paying minutes for nothing.
      - name: Manual Kotlin build (KMP shared + Android)
        if: matrix.language == 'java-kotlin'
        run: |
          chmod +x ./gradlew
          ./gradlew :androidApp:assembleDebug --no-daemon --stacktrace

      - name: Analyze
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
